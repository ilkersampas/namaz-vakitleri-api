name = "namaz-vakitleri-api"
main = "src/index.js"
compatibility_date = "2024-09-01"
workers_dev = true

# Production observability
[observability]
enabled = true

# ============================================================
# KV NAMESPACE'LER
# ============================================================

[[kv_namespaces]]
binding = "TOKEN_KV"
id = "1512b3b093084c439f6d9b0759dae174"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "37a242324e3248ff935a2365459bcadb"

# ============================================================
# ENVIRONMENT DEGISKENLERI
# ============================================================
[vars]
CACHE_TTL_SECONDS = "604800"           # 7 gun
GITHUB_PAGES_BASE = "https://ilkersampas.github.io/namaz-vakitleri-api/data"
LOG_LEVEL = "info"                     # silent | error | warn | info | debug

# Secret degiskenler:
# Deploy SONRASI Cloudflare Dashboard > Worker > Settings > Variables'a
# Encrypt isaretiyle ekle:
#   DIYANET_EMAIL
#   DIYANET_PASSWORD
