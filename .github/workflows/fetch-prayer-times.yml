name: Namaz Vakitlerini Guncelle

on:
  # Her ayin 1'inde 03:00 UTC
  schedule:
    - cron: '0 3 1 * *'

  workflow_dispatch:
    inputs:
      country_ids:
        description: 'Cekilecek ulke ID listesi (virgulle)'
        default: '2'
        required: false
      include_weekly:
        description: 'Haftalik vakitler dahil mi?'
        type: boolean
        default: false
      include_eid:
        description: 'Bayram namazi dahil mi?'
        type: boolean
        default: true
      include_ramadan:
        description: 'Ramazan imsakiye dahil mi?'
        type: boolean
        default: true

concurrency:
  group: fetch-prayer-times
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: .NET 8 kur
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Bagimliliklari geri yukle
        run: dotnet restore src/DiyanetFetcher.slnx

      - name: Testler
        run: dotnet test src/DiyanetFetcher.slnx --no-restore --verbosity minimal

      - name: Yayinla (publish)
        run: dotnet publish src/DiyanetFetcher/DiyanetFetcher.csproj -c Release -o publish --no-restore

      - name: Veri cekme
        env:
          DIYANET_EMAIL: ${{ secrets.DIYANET_EMAIL }}
          DIYANET_PASSWORD: ${{ secrets.DIYANET_PASSWORD }}
          OUTPUT_DIR: ${{ github.workspace }}/docs/data
          COUNTRY_IDS: ${{ github.event.inputs.country_ids || '2' }}
          INCLUDE_WEEKLY: ${{ github.event.inputs.include_weekly || 'false' }}
          INCLUDE_EID: ${{ github.event.inputs.include_eid || 'true' }}
          INCLUDE_RAMADAN: ${{ github.event.inputs.include_ramadan || 'true' }}
          INCLUDE_CITY_DETAIL: 'true'
        run: dotnet publish/DiyanetFetcher.dll

      - name: Veri ozeti
        if: always()
        run: |
          if [ -f docs/data/meta.json ]; then
            echo "## Veri ozeti" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat docs/data/meta.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Degisiklikleri commit et + push (rebase retry)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          if git diff --staged --quiet; then
            echo "Degisiklik yok, push atilmiyor."
            exit 0
          fi
          git commit -m "chore(data): namaz vakitleri guncellendi $(date -u +'%Y-%m-%d')"
          # Workflow uzun surdugu icin remote'a baska commit gelmis olabilir.
          # 5 deneme: pull --rebase + push. Veri kaybetmemek icin onemli.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Push basarili (deneme $attempt)"
              exit 0
            fi
            echo "Push reddedildi, pull --rebase yapiliyor (deneme $attempt/5)..."
            git pull --rebase --autostash origin main || exit 1
          done
          echo "::error::5 denemeden sonra push basarisiz"
          exit 1
          fi
