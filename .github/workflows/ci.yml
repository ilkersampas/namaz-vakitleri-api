name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'

permissions:
  contents: read

jobs:
  worker:
    name: Worker - install + smoke
    runs-on: ubuntu-latest
    # TODO: Vitest v4 syntax migration sonrasi npm test'i tekrar zorunlu yap
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Bagimliliklari kur
        working-directory: worker
        run: npm install --no-audit --no-fund

      - name: Wrangler syntax kontrolu
        working-directory: worker
        run: npx wrangler deploy --dry-run --outdir=/tmp/worker-build
        continue-on-error: true

      - name: Unit testler (su an best-effort)
        working-directory: worker
        run: npm test
        continue-on-error: true

  fetcher:
    name: Fetcher - test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - run: dotnet restore src/DiyanetFetcher.slnx

      - run: dotnet build src/DiyanetFetcher.slnx --no-restore --configuration Release

      - run: dotnet test src/DiyanetFetcher.slnx --no-build --configuration Release --verbosity minimal
