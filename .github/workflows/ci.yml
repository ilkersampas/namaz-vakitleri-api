name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'

permissions:
  contents: read

jobs:
  worker:
    name: Worker - test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - working-directory: worker
        run: npm ci

      - working-directory: worker
        run: npm test

  fetcher:
    name: Fetcher - test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - run: dotnet restore src/DiyanetFetcher.slnx

      - run: dotnet build src/DiyanetFetcher.slnx --no-restore --configuration Release

      - run: dotnet test src/DiyanetFetcher.slnx --no-build --configuration Release --verbosity minimal
