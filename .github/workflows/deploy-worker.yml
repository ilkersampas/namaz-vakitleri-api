name: Cloudflare Worker Deploy

on:
  # Otomatik deploy sadece wrangler.toml hazir olduktan sonra istenirse acilir.
  # Simdilik sadece manuel tetikleme.
  workflow_dispatch:

concurrency:
  group: deploy-worker
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    name: Worker testlerini calistir
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bagimliliklari yukle
        working-directory: worker
        run: npm install --no-audit --no-fund

      - name: Vitest calistir
        working-directory: worker
        run: npm test

  deploy:
    name: Cloudflare'e deploy et
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bagimliliklari yukle
        working-directory: worker
        run: npm install --no-audit --no-fund

      - name: wrangler.toml dogrula
        working-directory: worker
        run: |
          if grep -q "REPLACE_WITH_" wrangler.toml; then
            echo "::error::wrangler.toml hala placeholder iceriyor. KV namespace ID'lerini doldurun."
            exit 1
          fi

      - name: Deploy
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Sagligi kontrol et
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: |
          if [ -z "$WORKER_URL" ]; then
            echo "WORKER_URL secret tanimli degil, saglik kontrolu atlandi."
            exit 0
          fi
          echo "GET $WORKER_URL/health"
          sleep 5
          STATUS=$(curl -s -o /tmp/health.json -w "%{http_code}" "$WORKER_URL/health")
          cat /tmp/health.json
          if [ "$STATUS" != "200" ]; then
            echo "::error::Saglik kontrolu basarisiz (HTTP $STATUS)"
            exit 1
          fi
